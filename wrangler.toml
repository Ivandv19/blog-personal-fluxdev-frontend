# Configuración de despliegue para Cloudflare Pages con Astro.

# Nombre único del proyecto en Cloudflare Dashboard.
name = "fluxdev-blog-frontend"

# Fecha de compatibilidad con las APIs de Cloudflare Workers/Pages.
compatibility_date = "2026-04-30"

# Habilita la compatibilidad con módulos nativos de Node.js (necesario si usas APIs específicas)
compatibility_flags = [ "nodejs_compat" ]

# Directorio de salida del build de Astro (por defecto es dist)
pages_build_output_dir = "dist"

# Variables de entorno para estandarizar el entorno de construcción
[vars]
NODE_VERSION = "24.14.1"
BUN_VERSION = "1.3.13"
